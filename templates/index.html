<h3>Registrar café</h3>

<form action="/registrar" method="post">

    <label>Pagador:</label>
    <select name="pagador">
        {% for p in personas %}
            <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
    </select>

    <br><br>

    <label>Asistentes (separados por coma):</label>
    <input type="text" name="asistentes" placeholder="JoseG, Kike, Irantxu">

    <br><br>

    <button type="submit">Registrar café</button>
</form>
