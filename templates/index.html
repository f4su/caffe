<!DOCTYPE html>
<html>
<head>
    <title>Café balance</title>
</head>

<body>

<h1>☕ Cafés equilibrados</h1>

<!-- CONTENEDOR PRINCIPAL -->
<div style="display:flex; gap:20px; align-items:flex-start;">

    <!-- IZQUIERDA: CAFÉS PAGADOS -->
    <div style="border:1px solid #ccc; padding:10px; width:300px;">
        <h3>☕ Cafés pagados</h3>
        <ul>
            {% for p in personas %}
                <li>
                    {{ p }} → {{ data[p]["pagado"] }} cafés pagados
                </li>
            {% endfor %}
        </ul>
    </div>

    <!-- DERECHA: TRANSACCIONES -->
    <div style="border:1px solid #ccc; padding:10px; width:400px;">
        <h3>🧾 Últimos pagos</h3>

        <ul>
            {% for t in transactions %}
                <li>
                    <b>{{ t.pagador }}</b>
                    pagó {{ t.cantidad }} cafés a:
                    {{ t.asistentes | join(", ") }}
                </li>
            {% endfor %}
        </ul>
    </div>

</div>
